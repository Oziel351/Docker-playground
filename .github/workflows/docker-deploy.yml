name: Build and Push Docker Images

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}
  FRONTEND_IMAGE: docker-playground-frontend
  BACKEND_IMAGE: docker-playground-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase image owner
        run: echo "IMAGE_OWNER_LC=${IMAGE_OWNER,,}" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build frontend image
        run: |
          docker build \
            -t $REGISTRY/$IMAGE_OWNER_LC/$FRONTEND_IMAGE:latest \
            -t $REGISTRY/$IMAGE_OWNER_LC/$FRONTEND_IMAGE:${{ github.sha }} \
            ./frontend

      - name: Build backend image
        run: |
          docker build \
            -t $REGISTRY/$IMAGE_OWNER_LC/$BACKEND_IMAGE:latest \
            -t $REGISTRY/$IMAGE_OWNER_LC/$BACKEND_IMAGE:${{ github.sha }} \
            ./backend

      - name: Validate docker compose
        run: docker compose config

      - name: Push frontend image
        if: github.event_name == 'push'
        run: |
          docker push $REGISTRY/$IMAGE_OWNER_LC/$FRONTEND_IMAGE:latest
          docker push $REGISTRY/$IMAGE_OWNER_LC/$FRONTEND_IMAGE:${{ github.sha }}

      - name: Push backend image
        if: github.event_name == 'push'
        run: |
          docker push $REGISTRY/$IMAGE_OWNER_LC/$BACKEND_IMAGE:latest
          docker push $REGISTRY/$IMAGE_OWNER_LC/$BACKEND_IMAGE:${{ github.sha }}
