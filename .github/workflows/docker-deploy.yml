name: Build and Push Docker Images

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}
  FRONTEND_IMAGE: docker-app-frontend
  BACKEND_IMAGE: docker-app-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase image owner
        run: echo "IMAGE_OWNER_LC=${IMAGE_OWNER,,}" >> $GITHUB_ENV

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      - name: Lint frontend
        working-directory: ./frontend
        run: pnpm lint

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build frontend image
        run: |
          docker build \
            -t $REGISTRY/$IMAGE_OWNER_LC/$FRONTEND_IMAGE:${{ github.sha }} \
            -t $REGISTRY/$IMAGE_OWNER_LC/$FRONTEND_IMAGE:latest \
            ./frontend

      - name: Build backend image
        run: |
          docker build \
            -t $REGISTRY/$IMAGE_OWNER_LC/$BACKEND_IMAGE:${{ github.sha }} \
            -t $REGISTRY/$IMAGE_OWNER_LC/$BACKEND_IMAGE:latest \
            ./backend

      - name: Create .env for compose validation
        run: cp .env.example .env

      - name: Validate docker compose
        run: docker compose config
        env:
          IMAGE_OWNER_LC: ${{ env.IMAGE_OWNER_LC }}
          IMAGE_TAG: ${{ github.sha }}

      - name: Push frontend image
        if: github.event_name == 'push'
        run: |
          docker push $REGISTRY/$IMAGE_OWNER_LC/$FRONTEND_IMAGE:${{ github.sha }}
          docker push $REGISTRY/$IMAGE_OWNER_LC/$FRONTEND_IMAGE:latest

      - name: Push backend image
        if: github.event_name == 'push'
        run: |
          docker push $REGISTRY/$IMAGE_OWNER_LC/$BACKEND_IMAGE:${{ github.sha }}
          docker push $REGISTRY/$IMAGE_OWNER_LC/$BACKEND_IMAGE:latest
