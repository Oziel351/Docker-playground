services:
  frontend:
    container_name: frontend_prueba
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - web
  backend:
    container_name: backend_prueba
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: on-failure:3
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    networks:
      - internal
      - web

  db:
    image: postgres:16-alpine
    #Use .env instead of hardcoding user and also create a user or use default by postgresql
    environment:
      - POSTGRES_PASSWORD=mipass123
      - POSTGRES_DB=tienda
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d tienda "]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - internal
  cache:
    image: redis:7.0-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - internal

networks:
  web:
    driver: bridge
  internal:
    driver: bridge
    internal: true

volumes:
  redis-data:
    driver: local
  pg-data:
    driver: local
